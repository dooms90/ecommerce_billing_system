{% extends 'billing/base.html' %}

{% block content %}
<div style="background:white; padding:25px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); max-width:600px;">
    {% if product.image %}
        <img src="{{ product.image.url }}" alt="{{ product.name }}" style="width:100%; max-height:300px; object-fit:cover; border-radius:6px;">
    {% else %}
        <img src="https://via.placeholder.com/600x300?text=No+Image" style="width:100%; border-radius:6px;">
    {% endif %}

    <h2 style="margin-top:15px;">{{ product.name }}</h2>
    <p style="color:#777; margin:10px 0;">{{ product.description }}</p>
    <p class="price" style="font-size:22px;">₹{{ product.price }}</p>
      {% if user.is_staff %}
        <p class="stock">Stock available: {{ product.stock }}</p>
      {% endif %}

    <form method="post" action="{% url 'add_to_cart' product.id %}" style="margin-top:15px;">
    {% csrf_token %}
        <label>Quantity: </label>
        <input type="number" name="quantity" value="1" min="1" max="{{ product.stock }}" style="width:60px; padding:5px;">
        <button type="submit" class="btn" style="border:none; cursor:pointer;">Add to Cart</button>
    </form>

    <a href="{% url 'home' %}" style="display:inline-block; margin-top:15px; color:#1a1a2e;">&larr; Back to products</a>
</div>
{% endblock %}
